name: Fetch Manga
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch URL
        run: |
          curl -s "${{ github.event.inputs.url }}" > result.txt
          cat result.txt
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.txt
